<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00C9B1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Crabcake">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>[v2.2] Kitchen Lab 👨‍🔬 – Free Science Game for Kids Ages 5–10 | Crabcake Kids</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@700;800;900&display=swap" media="print" onload="this.media='all'"/>
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@700;800;900&display=swap"/></noscript>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0d1b2a; --deep:#0a1520;
  --teal:#00C9B1; --teal2:#00a896;
  --yellow:#FFD93D; --coral:#FF5C5C;
  --orange:#FF9040; --green:#4ECB71;
  --purple:#A66CFF; --sky:#6ECBF5;
  --white:#ffffff;
}

html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Nunito',sans-serif;touch-action:manipulation}

/* ── BACKGROUND BUBBLES ── */
.lab-bg{position:fixed;inset:0;z-index:0;overflow:hidden;
  background:radial-gradient(ellipse at 20% 50%,rgba(0,201,177,.07) 0%,transparent 60%),
             radial-gradient(ellipse at 80% 20%,rgba(166,108,255,.07) 0%,transparent 50%),
             var(--bg)}
.bubble-wrap{position:absolute;inset:0;pointer-events:none}
.lab-bubble{position:absolute;border-radius:50%;opacity:.12;animation:rise linear infinite}
@keyframes rise{0%{transform:translateY(100vh) scale(0)}100%{transform:translateY(-120px) scale(1)}}

/* ── SCREENS ── */
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1rem;overflow:hidden}
.screen.hidden{display:none}

/* ── START SCREEN ── */
#startScreen{gap:0;padding:1.5rem 1rem}
.lab-icon{font-size:4rem;margin-bottom:.3rem;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.game-title{font-family:'Boogaloo',cursive;font-size:clamp(2.4rem,8vw,4rem);color:var(--teal);text-shadow:0 3px 12px rgba(0,201,177,.4);text-align:center;line-height:1;margin-bottom:.2rem}
.game-subtitle{color:rgba(255,255,255,.5);font-size:.8rem;letter-spacing:2px;text-transform:uppercase;margin-bottom:1.4rem}
.age-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;width:100%;max-width:420px;margin-bottom:1rem}
.age-btn{padding:.9rem .5rem;border-radius:16px;border:2px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#fff;cursor:pointer;transition:all .2s;text-align:center;font-family:'Nunito',sans-serif;display:flex;flex-direction:column;align-items:center;gap:.15rem}
.age-btn:hover{transform:translateY(-3px);background:rgba(0,201,177,.15);border-color:var(--teal)}
.age-btn.selected{transform:translateY(-3px)}
.age-btn[data-age="5"].selected{border-color:var(--teal);background:rgba(0,201,177,.2);box-shadow:0 0 16px rgba(0,201,177,.35)}
.age-btn[data-age="7"].selected{border-color:#FFD54F;background:rgba(255,213,79,.15);box-shadow:0 0 16px rgba(255,213,79,.35)}
.age-btn[data-age="9"].selected{border-color:#FF6B6B;background:rgba(255,107,107,.15);box-shadow:0 0 16px rgba(255,107,107,.35)}
.start-exp-btn{margin-top:.6rem;padding:.75rem 2rem;border-radius:50px;border:none;font-family:'Boogaloo',cursive;font-size:1.2rem;cursor:pointer;transition:all .25s;
  background:linear-gradient(135deg,var(--teal),var(--purple));color:#fff;box-shadow:0 4px 20px rgba(0,201,177,.3)}
.start-exp-btn:disabled{background:rgba(255,255,255,.1);box-shadow:none;color:rgba(255,255,255,.3);cursor:not-allowed}
.start-exp-btn:not(:disabled):hover{transform:translateY(-2px) scale(1.04);box-shadow:0 8px 28px rgba(0,201,177,.45)}
.age-btn .age-emoji{font-size:1.8rem;display:block;margin-bottom:.3rem}
.age-btn .age-label{font-size:.7rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--teal)}
.age-btn .age-topic{font-size:.6rem;color:rgba(255,255,255,.5);margin-top:.2rem;text-align:center}
.back-link{color:rgba(255,255,255,.35);font-size:.75rem;text-decoration:none;letter-spacing:1px;margin-top:.5rem}
.back-link:hover{color:var(--teal)}
.start-home-btn{position:fixed;top:1rem;left:1rem;z-index:50;text-decoration:none}

/* ── HUD ── */
#hud{position:fixed;top:0;left:0;right:0;z-index:30;
  display:grid;grid-template-columns:1fr auto 1fr;
  align-items:center;padding:.7rem 1.2rem;
  background:rgba(10,21,32,.92);backdrop-filter:blur(8px);
  border-bottom:2px solid rgba(0,201,177,.25)}
#hud.hidden{display:none}
.hud-left{display:flex;align-items:center;gap:.8rem;justify-content:flex-start}
.hud-center{display:flex;justify-content:center}
.hud-right{display:flex;align-items:center;gap:.5rem;justify-content:flex-end}
.hud-item{display:flex;flex-direction:column;align-items:center;gap:1px}
.hud-label{font-size:.55rem;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.4)}
.hud-value{font-size:1.6rem;font-weight:900;color:#fff;line-height:1}
.hud-btn{display:flex;flex-direction:column;align-items:center;gap:2px;background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.12);border-radius:12px;padding:.3rem .7rem;cursor:pointer;transition:all .15s;text-decoration:none;color:#fff;font-family:'Nunito',sans-serif}
.hud-btn:hover{background:rgba(255,255,255,.14);transform:translateY(-2px)}
.hud-btn-icon{font-size:1.2rem;line-height:1}
.hud-btn-label{font-size:.5rem;font-weight:900;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4)}
.progress-pips{display:flex;gap:8px;justify-content:center;align-items:center;min-height:20px;padding:.2rem 0}
.pip{width:14px;height:14px;border-radius:50%;background:rgba(255,255,255,.3);border:2px solid rgba(255,255,255,.4);transition:background .3s,transform .3s}
.pip.done{background:var(--green);border-color:var(--green);transform:scale(1.2)}
.pip.done-warn{background:var(--yellow);border-color:var(--yellow);transform:scale(1.2)}
.pip.current{background:rgba(255,255,255,.6);border-color:#fff;transform:scale(1.3);box-shadow:0 0 10px rgba(255,255,255,.4)}

@media(max-width:600px){
  #hud{padding:.5rem .6rem .5rem .8rem;grid-template-columns:auto auto auto}
  .hud-left{gap:.4rem}
  .hud-right{gap:.3rem}
  .hud-btn{padding:.25rem .5rem;border-radius:8px;min-width:0}
  .hud-btn-icon{font-size:1rem}
  .hud-btn-label{font-size:.38rem;letter-spacing:.5px}
  .hud-label{font-size:.42rem}
  .hud-value{font-size:1.1rem}
  #kl-avatar-hud svg{width:36px !important;height:auto !important}
}

/* ── GAME SCREEN ── */
#gameScreen{justify-content:flex-start;padding-top:80px;gap:0;overflow-y:auto}

/* TARGET */
.target-card{width:100%;max-width:480px;display:flex;align-items:center;gap:.8rem;
  background:rgba(0,201,177,.08);border:2px solid rgba(0,201,177,.25);
  border-radius:16px;padding:.6rem 1rem;margin-bottom:.6rem;flex-shrink:0}
.target-label{font-size:.6rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--teal);opacity:.7}
.target-name{font-family:'Boogaloo',cursive;font-size:1.4rem;color:#fff}
.target-emoji{font-size:2.2rem;margin-left:auto}

/* BEAKER */
.beaker-wrap{position:relative;flex-shrink:0;margin-bottom:.5rem;display:flex;flex-direction:column;align-items:center}
.beaker-svg-wrap{position:relative;width:130px;height:160px}
.beaker-svg{width:100%;height:100%}
.beaker-liquid{transition:height .4s ease,fill .4s ease}
.beaker-bubbles{position:absolute;bottom:30px;left:50%;transform:translateX(-50%);width:80px;height:80px;pointer-events:none}
.beaker-bubble{position:absolute;border-radius:50%;opacity:0;animation:bub 1.2s ease-in infinite}
@keyframes bub{0%{opacity:.7;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(.4)}}
.slot-row{display:flex;gap:.5rem;margin-top:.4rem;flex-shrink:0}
.ing-slot{width:56px;height:56px;border-radius:12px;border:2px dashed rgba(255,255,255,.2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(255,255,255,.04);transition:all .3s;font-size:1.4rem;position:relative;cursor:pointer}
.ing-slot.filled{border-style:solid;border-color:rgba(0,201,177,.5);background:rgba(0,201,177,.1)}
.ing-slot .slot-name{font-size:.42rem;font-weight:800;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.5px;margin-top:1px;max-width:50px;text-align:center;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ing-slot .remove-x{position:absolute;top:-6px;right:-6px;width:16px;height:16px;border-radius:50%;background:var(--coral);color:#fff;font-size:.55rem;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .2s}
.ing-slot.filled:hover .remove-x{opacity:1}

/* MIX BUTTON */
.mix-btn{padding:.7rem 2.5rem;border-radius:50px;border:none;font-family:'Boogaloo',cursive;font-size:1.3rem;cursor:pointer;transition:all .2s;margin:.4rem 0;flex-shrink:0;
  background:linear-gradient(135deg,var(--teal),var(--purple));color:#fff;
  box-shadow:0 4px 20px rgba(0,201,177,.3);letter-spacing:.5px}
.mix-btn:disabled{background:rgba(255,255,255,.1);box-shadow:none;color:rgba(255,255,255,.3);cursor:not-allowed}
.mix-btn:not(:disabled):hover{transform:translateY(-2px) scale(1.04);box-shadow:0 8px 28px rgba(0,201,177,.45)}
.mix-btn.pulse{animation:mixPulse 1s ease-in-out infinite}
@keyframes mixPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.hint-btn{padding:.7rem 1.2rem;border-radius:50px;border:2px solid rgba(255,217,61,.4);background:rgba(255,217,61,.08);color:var(--yellow);font-family:'Boogaloo',cursive;font-size:1.1rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.hint-btn:hover{background:rgba(255,217,61,.18);border-color:var(--yellow);transform:translateY(-2px)}
.hint-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
/* Hint toast */
.hint-toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(20px);z-index:60;
  background:rgba(255,217,61,.15);border:1px solid rgba(255,217,61,.4);border-radius:14px;
  padding:.6rem 1.2rem;max-width:320px;text-align:center;
  opacity:0;transition:all .35s;pointer-events:none}
.hint-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hint-toast-text{font-size:.78rem;font-weight:800;color:var(--yellow);line-height:1.4}

/* INGREDIENT SHELF */
.shelf-title{font-size:.58rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:.4rem;flex-shrink:0}
.ingredient-shelf{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center;width:100%;max-width:480px;flex-shrink:0;padding-bottom:.5rem}
.ing-btn{display:flex;flex-direction:column;align-items:center;gap:3px;
  width:72px;padding:.5rem .3rem;border-radius:14px;border:2px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);cursor:pointer;transition:all .2s;
  font-family:'Nunito',sans-serif;color:#fff}
.ing-btn:hover:not(.used){transform:translateY(-3px);background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.3)}
.ing-btn .ing-em{font-size:1.8rem;line-height:1}
.ing-btn .ing-name{font-size:.5rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.6);text-align:center;max-width:64px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.ing-btn.selected{border-color:var(--teal);background:rgba(0,201,177,.15);transform:translateY(-3px)}
.ing-btn.used{opacity:.35;cursor:not-allowed;transform:none}
@media(max-width:400px){.ing-btn{width:64px;padding:.4rem .2rem}.ing-btn .ing-em{font-size:1.6rem}}

/* ── RESULT OVERLAY ── */
#resultOverlay{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;
  background:rgba(10,21,32,.96);backdrop-filter:blur(8px)}
#resultOverlay.hidden{display:none}
.result-emoji{font-size:5rem;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;margin-bottom:.5rem}
.result-title{font-family:'Boogaloo',cursive;font-size:2rem;color:var(--teal);margin-bottom:.3rem;text-align:center}
.result-subtitle{font-size:.8rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;margin-bottom:.8rem}
.result-subtitle.correct{color:var(--green)}
.result-subtitle.wrong{color:var(--coral)}
.fact-box{background:rgba(0,201,177,.1);border:2px solid rgba(0,201,177,.25);border-radius:16px;padding:1rem 1.2rem;max-width:400px;margin-bottom:.6rem;text-align:center}
.hint-box{background:rgba(255,217,61,.08);border:2px solid rgba(255,217,61,.3);border-radius:16px;padding:1rem 1.2rem;max-width:400px;margin-bottom:1rem;text-align:center}
.fact-label{font-size:.55rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--teal);margin-bottom:.3rem}
.fact-text{font-size:.85rem;color:rgba(255,255,255,.85);line-height:1.5}
.result-btns{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center}
.btn-next{padding:.7rem 1.8rem;border-radius:50px;border:none;font-family:'Boogaloo',cursive;font-size:1.1rem;cursor:pointer;
  background:linear-gradient(135deg,var(--teal),var(--purple));color:#fff;
  box-shadow:0 4px 20px rgba(0,201,177,.3)}
.btn-next:hover{transform:translateY(-2px)}
.btn-retry{padding:.7rem 1.5rem;border-radius:50px;border:2px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.7);font-family:'Boogaloo',cursive;font-size:1.1rem;cursor:pointer}
.btn-retry:hover{border-color:rgba(255,255,255,.4);color:#fff}
@keyframes popIn{from{opacity:0;transform:scale(.4) rotate(-10deg)}to{opacity:1;transform:scale(1) rotate(0)}}

/* ── END SCREEN ── */
#endScreen{gap:.7rem}
.end-icon{font-size:4rem;animation:float 3s ease-in-out infinite}
.end-title{font-family:'Boogaloo',cursive;font-size:2.5rem;color:var(--yellow);text-align:center}
.end-score{font-size:1rem;color:rgba(255,255,255,.6);text-align:center}
.end-stars{font-size:2rem;letter-spacing:.3rem}
.end-badges-wrap{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:1rem;width:100%;max-width:400px;text-align:center}
.end-badges-title{font-size:.6rem;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--yellow);margin-bottom:.6rem}
.end-badges-row{display:flex;flex-wrap:wrap;gap:.5rem;justify-content:center}
.badge-coin{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:default}
.badge-coin-em{font-size:2rem;background:radial-gradient(circle at 35% 35%,#ffd700,#b8860b);border-radius:50%;width:48px;height:48px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.4),inset 0 1px 2px rgba(255,255,255,.3)}
.badge-coin-name{font-size:.48rem;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--yellow);text-align:center;max-width:52px}
.badge-coin.new-badge .badge-coin-em{animation:badgePop .5s cubic-bezier(.34,1.56,.64,1) both;box-shadow:0 0 20px rgba(255,215,0,.6),0 4px 12px rgba(0,0,0,.4),inset 0 1px 2px rgba(255,255,255,.3)}
@keyframes badgePop{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
.end-btns{display:flex;gap:.7rem;flex-wrap:wrap;justify-content:center}
.btn-play-again{padding:.7rem 1.8rem;border-radius:50px;border:none;font-family:'Boogaloo',cursive;font-size:1.1rem;cursor:pointer;
  background:linear-gradient(135deg,var(--teal),var(--purple));color:#fff}
.btn-home{padding:.7rem 1.5rem;border-radius:50px;border:2px solid rgba(255,255,255,.2);background:transparent;color:rgba(255,255,255,.7);font-family:'Boogaloo',cursive;font-size:1.1rem;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}

/* ── MIX FLASH ── */
.mix-flash{position:fixed;inset:0;z-index:40;pointer-events:none;opacity:0;transition:opacity .1s}
.mix-flash.on{opacity:1}

/* ── FEEDBACK STRIP ── */
.feedback-strip{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:.7rem 1rem;width:100%;max-width:400px;text-align:center;flex-shrink:0}
.feedback-text{font-size:.7rem;color:rgba(255,255,255,.45);margin-bottom:.5rem}
.feedback-btns{display:flex;gap:.5rem;justify-content:center}
.feedback-btn{padding:.35rem .9rem;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.5);font-size:.65rem;font-family:'Nunito',sans-serif;cursor:pointer;text-decoration:none;transition:all .2s}
.feedback-btn:hover{border-color:var(--teal);color:var(--teal)}

/* ── CONFETTI ── */
#confetti-canvas{position:fixed;inset:0;z-index:45;pointer-events:none}

/* ── TOAST ── */
.toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-20px);z-index:60;
  background:rgba(30,40,55,.95);border:1px solid rgba(0,201,177,.3);border-radius:50px;
  padding:.5rem 1.2rem;display:flex;align-items:center;gap:.5rem;
  opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast-em{font-size:1.3rem}.toast-name{font-size:.75rem;font-weight:800;color:var(--yellow)}
</style>
</head>
<body>

<div class="lab-bg">
  <div class="bubble-wrap" id="bgBubbles"></div>
</div>

<canvas id="confetti-canvas"></canvas>
<canvas id="fx-canvas" style="position:fixed;inset:0;z-index:44;pointer-events:none"></canvas>
<div class="mix-flash" id="mixFlash"></div>
<div class="toast" id="toast"><span class="toast-em" id="toastEm"></span><span class="toast-name" id="toastName"></span></div>
<div class="hint-toast" id="hintToast"><div class="hint-toast-text" id="hintToastText"></div></div>

<!-- ══ START SCREEN ══ -->
<div class="screen" id="startScreen">
  <a class="hud-btn start-home-btn" href="index.html#games" title="Home">
    <span class="hud-btn-icon">🏠</span>
    <span class="hud-btn-label">Home</span>
  </a>
  <div class="lab-icon">👨‍🔬</div>
  <div class="game-title">Kitchen Lab</div>
  <div class="game-subtitle">Mix · React · Discover</div>
  <div class="age-grid">
    <button class="age-btn" data-age="5" onclick="selectAge(5,this)">
      <span class="age-emoji">🌱</span>
      <span class="age-label">Ages 5–6</span>
      <span class="age-topic">States of Matter</span>
    </button>
    <button class="age-btn" data-age="7" onclick="selectAge(7,this)">
      <span class="age-emoji">🔬</span>
      <span class="age-label">Ages 7–8</span>
      <span class="age-topic">Reactions</span>
    </button>
    <button class="age-btn" data-age="9" onclick="selectAge(9,this)">
      <span class="age-emoji">⚗️</span>
      <span class="age-label">Ages 9–10</span>
      <span class="age-topic">Chemistry</span>
    </button>
  </div>
  <button class="start-exp-btn" id="startExpBtn" onclick="startGame()" disabled>Let's Experiment! 👨‍🔬</button>
</div>

<!-- ══ HUD ══ -->
<div id="hud" class="hidden">
  <div class="hud-left">
    <div class="hud-item">
      <div class="hud-label">Lives</div>
      <div class="hud-value" id="livesVal">❤️❤️❤️</div>
    </div>
  </div>
  <div class="hud-center">
    <div id="kl-avatar-hud" data-hud-size="48"></div>
  </div>
  <div class="hud-right">
    <button class="hud-btn" id="soundToggleBtn" onclick="toggleSound()" title="Sound">
      <span class="hud-btn-icon">🔊</span>
      <span class="hud-btn-label">Sound</span>
    </button>
    <button class="hud-btn" onclick="hudBack()">
      <span class="hud-btn-icon">↩️</span>
      <span class="hud-btn-label">Levels</span>
    </button>
    <a class="hud-btn" href="index.html#games" style="text-decoration:none;">
      <span class="hud-btn-icon">🏠</span>
      <span class="hud-btn-label">Home</span>

let selectedAge = null;
let experiments  = [];
let expIndex     = 0;

let lives        = 3;
let selected     = []; // ingredient IDs currently selected
let gameRunning  = false;

// ══════════════════════════════════════════════
// AUDIO
// ══════════════════════════════════════════════
function getAudio(){
  if(!audioCtx) audioCtx = new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}
function toggleSound(){
  _soundOn=!_soundOn;
  const btn=document.getElementById('soundToggleBtn');
  if(btn){btn.querySelector('.hud-btn-icon').textContent=_soundOn?'🔊':'🔇';
          btn.querySelector('.hud-btn-label').textContent=_soundOn?'Sound':'Muted';}
}
function playSound(type){
  if(!_soundOn)return;
  try{
    const ac=getAudio();
    if(ac.state==='suspended')ac.resume();

    if(type==='tap'){
      const osc=ac.createOscillator(),g=ac.createGain();
      osc.connect(g);g.connect(ac.destination);
      osc.type='sine';osc.frequency.setValueAtTime(660,ac.currentTime);
      g.gain.setValueAtTime(.08,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.12);
      osc.start(ac.currentTime);osc.stop(ac.currentTime+.12);

    } else if(type==='bubble'){
      const osc=ac.createOscillator(),g=ac.createGain();
      osc.connect(g);g.connect(ac.destination);
      osc.type='sine';
      osc.frequency.setValueAtTime(800,ac.currentTime);
      osc.frequency.exponentialRampToValueAtTime(400,ac.currentTime+.15);
      g.gain.setValueAtTime(.06,ac.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+.15);
      osc.start(ac.currentTime);osc.stop(ac.currentTime+.15);

    } else if(type==='correct'){
      // Fun: fizzing bubbles then rising chime + sparkle
      const t=ac.currentTime;

      // Bubble fizz layer — noise burst
      const bufSize=ac.sampleRate*.3;
      const buf=ac.createBuffer(1,bufSize,ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<bufSize;i++)d[i]=(Math.random()*2-1)*.3;
      const noise=ac.createBufferSource();
      noise.buffer=buf;
      const noiseFilter=ac.createBiquadFilter();
      noiseFilter.type='bandpass';noiseFilter.frequency.value=1200;noiseFilter.Q.value=2;
      const noiseGain=ac.createGain();
      noiseGain.gain.setValueAtTime(.18,t);
      noiseGain.gain.exponentialRampToValueAtTime(.001,t+.3);
      noise.connect(noiseFilter);noiseFilter.connect(noiseGain);noiseGain.connect(ac.destination);
      noise.start(t);noise.stop(t+.3);

      // Rising magic chime — C maj arpeggio
      const notes=[523,659,784,1047];
      notes.forEach((freq,i)=>{
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);
        o.type='sine';
        o.frequency.setValueAtTime(freq,t+i*.1);
        g.gain.setValueAtTime(0,t+i*.1);
        g.gain.linearRampToValueAtTime(.18,t+i*.1+.04);
        g.gain.exponentialRampToValueAtTime(.001,t+i*.1+.35);
        o.start(t+i*.1);o.stop(t+i*.1+.4);
      });

      // High sparkle glitter on top
      for(let i=0;i<5;i++){
        const o=ac.createOscillator(),g=ac.createGain();
        o.connect(g);g.connect(ac.destination);
        o.type='sine';
        const f=2000+Math.random()*2000;
        o.frequency.setValueAtTime(f,t+i*.06);
        o.frequency.exponentialRampToValueAtTime(f*1.4,t+i*.06+.15);
        g.gain.setValueAtTime(.07,t+i*.06);
        g.gain.exponentialRampToValueAtTime(.001,t+i*.06+.2);
        o.start(t+i*.06);o.stop(t+i*.06+.25);
      }

      // Satisfying low thud to seal the deal
      const sub=ac.createOscillator(),subG=ac.createGain();
      sub.connect(subG);subG.connect(ac.destination);
      sub.type='sine';
      sub.frequency.setValueAtTime(120,t);
      sub.frequency.exponentialRampToValueAtTime(60,t+.25);
      subG.gain.setValueAtTime(.3,t);
      subG.gain.exponentialRampToValueAtTime(.001,t+.3);
      sub.start(t);sub.stop(t+.3);

    } else if(type==='wrong'){
      // Fun: boiling rumble + splat + descending wail
      const t=ac.currentTime;

      // Low rumble — filtered noise
      const bufSize=ac.sampleRate*.6;
      const buf=ac.createBuffer(1,bufSize,ac.sampleRate);
      const d=buf.getChannelData(0);
      for(let i=0;i<bufSize;i++)d[i]=(Math.random()*2-1);
      const noise=ac.createBufferSource();
      noise.buffer=buf;
      const rumbleFilter=ac.createBiquadFilter();
      rumbleFilter.type='lowpass';rumbleFilter.frequency.value=300;
      const rumbleGain=ac.createGain();
      rumbleGain.gain.setValueAtTime(.35,t);
      rumbleGain.gain.exponentialRampToValueAtTime(.001,t+.5);
      noise.connect(rumbleFilter);rumbleFilter.connect(rumbleGain);rumbleGain.connect(ac.destination);
      noise.start(t);noise.stop(t+.55);

      // Explosion burst — high noise
      const expBuf=ac.createBuffer(1,ac.sampleRate*.15,ac.sampleRate);
      const ed=expBuf.getChannelData(0);
      for(let i=0;i<ed.length;i++)ed[i]=(Math.random()*2-1);
      const expNoise=ac.createBufferSource();
      expNoise.buffer=expBuf;
      const expGain=ac.createGain();
      expGain.gain.setValueAtTime(.5,t+.05);
      expGain.gain.exponentialRampToValueAtTime(.001,t+.2);
      expNoise.connect(expGain);expGain.connect(ac.destination);
      expNoise.start(t+.05);expNoise.stop(t+.22);

      // Descending wail — comic fail sound
      const o=ac.createOscillator(),g=ac.createGain();
      o.connect(g);g.connect(ac.destination);
      o.type='sawtooth';
      o.frequency.setValueAtTime(600,t+.1);
      o.frequency.exponentialRampToValueAtTime(80,t+.7);
      g.gain.setValueAtTime(.2,t+.1);
      g.gain.exponentialRampToValueAtTime(.001,t+.75);
      o.start(t+.1);o.stop(t+.78);

      // Splat hits — 3 quick impacts
      [0,.08,.16].forEach((dt,i)=>{
        const so=ac.createOscillator(),sg=ac.createGain();
        so.connect(sg);sg.connect(ac.destination);
        so.type='sine';
        so.frequency.setValueAtTime(200-i*40,t+dt);
        so.frequency.exponentialRampToValueAtTime(50,t+dt+.12);
        sg.gain.setValueAtTime(.25,t+dt);
        sg.gain.exponentialRampToValueAtTime(.001,t+dt+.15);
        so.start(t+dt);so.stop(t+dt+.18);
      });
    }
  }catch(e){}
}

function selectAge(age, btn){
  selectedAge = age;
  document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  const startBtn = document.getElementById('startExpBtn');
  startBtn.disabled = false;
}

function startGame(){
  if(!selectedAge) return;
  const age = selectedAge;
  try{
    if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    if(audioCtx.state==='suspended')audioCtx.resume();
  }catch(e){}

  try {
    experiments=[...EXPERIMENTS[age]].sort(()=>Math.random()-.5);
  } catch(e) {
    alert('CRASH at experiments spread: '+e.message); return;
  }
  expIndex=0; score=0; lives=3; selected=[]; pipResults={};
  gameRunning=true;

  document.getElementById('startScreen').classList.add('hidden');
  try { document.querySelector('.start-home-btn').style.display='none'; } catch(e){}
  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('gameScreen').classList.remove('hidden');

  buildProgressPips();
  updateHUD();

  // Debug: show experiment count on screen
  document.getElementById('targetName').textContent = 'Loading... ('+experiments.length+' exps)';

  try {
    loadExperiment();
  } catch(e) {
    alert('CRASH in loadExperiment: '+e.message);
  }
}

function hudBack(){
  gameRunning=false;
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('gameScreen').classList.add('hidden');
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('resultOverlay').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');

}

function resetBeaker(){
  const rect=document.getElementById('liquidRect');
  rect.setAttribute('y','138');
  rect.setAttribute('height','0');
  rect.setAttribute('fill','rgba(0,201,177,0.4)');
  ['b1','b2','b3'].forEach(id=>{
    const b=document.getElementById(id);
    b.style.opacity='0';
    b.style.animation='none';
  });
}

function fillBeaker(){
  const rect=document.getElementById('liquidRect');
  const n=selected.length;
  const maxFill=90; // px height inside beaker
  const h=Math.min(n*30,maxFill);
  const y=138-h;

  rect.setAttribute('y',y);
  rect.setAttribute('height',h);

  // Blend colours of selected ingredients
  if(n>0){
    const colors=selected.map(id=>currentExp.ingredients.find(ing=>ing.id===id)?.color||'#00C9B1');
    rect.setAttribute('fill',colors[colors.length-1]+'bb');
  }

  // Animate beaker bubbles when filling
  if(n>0){
    ['b1','b2','b3'].forEach((id,i)=>{
      const b=document.getElementById(id);
      b.setAttribute('cy',y+10+i*8);
      b.style.opacity='.6';
      b.style.animation=`bub ${.8+i*.3}s ease-in ${i*.2}s infinite`;
    });
    playSound('bubble');
  }
}

// SLOTS
// ══════════════════════════════════════════════
function buildSlots(){
  const row=document.getElementById('slotRow');
  const needed=currentExp.correct.length;
  row.innerHTML='';
  for(let i=0;i<needed;i++){
    const slot=document.createElement('div');
    slot.className='ing-slot';
    slot.id=`slot-${i}`;
    slot.innerHTML='<span style="font-size:1.4rem;opacity:.3">+</span>';
    slot.onclick=()=>removeFromSlot(i);
    row.appendChild(slot);
  }
}

function updateSlots(){
  const needed=currentExp.correct.length;
  for(let i=0;i<needed;i++){
    const slot=document.getElementById(`slot-${i}`);
    if(!slot)continue;
    if(i<selected.length){
      const ing=currentExp.ingredients.find(x=>x.id===selected[i]);
      slot.className='ing-slot filled';
      slot.innerHTML=`<span>${ing.e}</span><span class="slot-name">${ing.n}</span><span class="remove-x">✕</span>`;
      slot.onclick=()=>removeFromSlot(i);
    } else {
      slot.className='ing-slot';
      slot.innerHTML='<span style="font-size:1.4rem;opacity:.3">+</span>';
      slot.onclick=null;
    }
  }
}

function removeFromSlot(i){
  if(i<selected.length){
    const id=selected[i];
    selected.splice(i,1);
    // Re-enable shelf button
    const btn=document.querySelector(`.ing-btn[data-id="${id}"]`);
    if(btn)btn.classList.remove('selected','used');
    updateSlots();
    fillBeaker();
    updateMixBtn();
  }
}

// INGREDIENT SHELF
// ══════════════════════════════════════════════
function buildShelf(){
  const shelf=document.getElementById('ingredientShelf');
  shelf.innerHTML='';
  currentExp.ingredients.forEach(ing=>{
    const btn=document.createElement('button');
    btn.className='ing-btn';
    btn.dataset.id=ing.id;
    btn.innerHTML=`<span class="ing-em">${ing.e}</span><span class="ing-name">${ing.n}</span>`;
    btn.onclick=()=>selectIngredient(ing.id,btn);
    shelf.appendChild(btn);
  });
}

function selectIngredient(id,btn){
  if(btn.classList.contains('used')&&selected.includes(id)){
    // Deselect — remove from selected
    const i=selected.indexOf(id);
    selected.splice(i,1);
    btn.classList.remove('selected','used');
    updateSlots();
    fillBeaker();
    updateMixBtn();
    return;
  }
  if(btn.classList.contains('used'))return;

  const needed=currentExp.correct.length;
  if(selected.length>=needed)return;

  selected.push(id);
  btn.classList.add('selected','used');
  playSound('tap');

  updateSlots();
  fillBeaker();
  updateMixBtn();
}

function updateMixBtn(){
  const needed=currentExp.correct.length;
  const btn=document.getElementById('mixBtn');
  const ready=selected.length===needed;
  btn.disabled=!ready;
  if(ready)btn.classList.add('pulse');
  else btn.classList.remove('pulse');
}

let _hintUsed=false;

function autoHint(){
  const missing=currentExp.correct.filter(id=>!selected.includes(id));
  if(!missing.length)return;
  const reveal=missing[Math.floor(Math.random()*missing.length)];
  const ing=currentExp.ingredients.find(x=>x.id===reveal);
  if(!ing)return;
  _highlightHint(reveal,ing,'💡 Hint — try');
}

function _highlightHint(id,ing,prefix){
  const btn=document.querySelector(`.ing-btn[data-id="${id}"]`);
  if(btn){
    btn.style.boxShadow='0 0 0 4px var(--yellow), 0 0 24px rgba(255,217,61,.7)';
    btn.style.borderColor='var(--yellow)';
    btn.style.transform='translateY(-4px) scale(1.08)';
    setTimeout(()=>{
      if(btn){btn.style.boxShadow='';btn.style.borderColor='';btn.style.transform='';}
    },4000);
  }
  const t=document.getElementById('hintToast');
  document.getElementById('hintToastText').textContent=`${prefix} ${ing.e} ${ing.n}!`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),4000);
}

function showHint(){
  if(!currentExp||_hintUsed)return;
  _hintUsed=true;
  document.getElementById('hintBtn').disabled=true;
  document.getElementById('hintBtn').textContent='💡 Used';
  const missing=currentExp.correct.filter(id=>!selected.includes(id));
  if(!missing.length)return;
  const reveal=missing[0];
  const ing=currentExp.ingredients.find(x=>x.id===reveal);
  if(!ing)return;
  _highlightHint(reveal,ing,'💡 Try adding');
  playSound('tap');
}

// MIX!
// ══════════════════════════════════════════════
function doMix(){
  if(!currentExp)return;
  document.getElementById('mixBtn').disabled=true;
  document.getElementById('mixBtn').classList.remove('pulse');

  // Check correctness — order doesn't matter
  const needed=new Set(currentExp.correct);
  const got=new Set(selected);
  const isCorrect=[...needed].every(id=>got.has(id))&&needed.size===got.size;

  // Visual FX + audio fire immediately on click
  if(isCorrect){ fxCorrect(); playSound('correct'); } else { fxWrong(); playSound('wrong'); }
  flashBeaker(isCorrect?'#4ECB71':'#FF5C5C');

  const delay = isCorrect ? 1200 : 1600;
  setTimeout(()=>{
    if(isCorrect){
      score++;
      updateHUD();
      pipResults[expIndex]=livesAtExpStart-lives;
      spawnConfetti();
      showResult(true);
    } else {
      lives=Math.max(0,lives-1);
      updateHUD();
      pipResults[expIndex]=livesAtExpStart-lives;
      showResult(false, lives<=0);
    }
    updatePips();
  },delay);
}

    });

function runFX(canvas,ctx,particles,maxFrames){
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx;
      p.y+=p.vy;
      if(p.grav)p.vy+=p.grav;
      if(p.type==='smoke')p.r+=.3;
      p.life-=p.decay;
      if(p.life<=0)return;

      ctx.save();
      ctx.globalAlpha=Math.max(0,p.life);

      if(p.type==='smoke'){
        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
        g.addColorStop(0,p.color+'0.25)');
        g.addColorStop(1,p.color+'0)');
        ctx.fillStyle=g;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      } else if(p.type==='bubble'){
        ctx.strokeStyle=p.color+'0.8)';
        ctx.lineWidth=1.5;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.stroke();
      } else if(p.type==='spark'||p.type==='ember'){
        ctx.fillStyle=p.color+'1)';
        ctx.shadowColor=p.color+'1)';
        ctx.shadowBlur=6;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      } else {
        // explode / blob
        const g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r);
        g.addColorStop(0,p.color+'1)');
        g.addColorStop(1,p.color+'0)');
        ctx.fillStyle=g;
        ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    });
    frame++;
    if(frame<maxFrames)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ══════════════════════════════════════════════
// RESULT OVERLAY
// ══════════════════════════════════════════════
function showResult(correct,outOfLives){
  const overlay=document.getElementById('resultOverlay');
  document.getElementById('resultEmoji').textContent=correct?currentExp.target.e:'💥';
  document.getElementById('resultTitle').textContent=correct?currentExp.target.n:(outOfLives?'Game Over!':'Oops!');
  const sub=document.getElementById('resultSubtitle');
  sub.textContent=correct?'✅ Correct!':(outOfLives?'❌ Out of lives!':'❌ Wrong mixture');
  sub.className='result-subtitle '+(correct?'correct':'wrong');

  // Fact box — correct only
  document.getElementById('factBox').style.display=correct?'':'none';
  document.getElementById('factText').textContent=correct?currentExp.fact:'';

  // Hint box — wrong only
  const hintBox=document.getElementById('hintBox');
  if(!correct){
    const allCorrect=currentExp.correct;
    const hintId=allCorrect[Math.floor(Math.random()*allCorrect.length)];
    const hintIng=currentExp.ingredients.find(x=>x.id===hintId);
    if(hintIng){
      document.getElementById('hintBoxText').textContent=
        'Try using '+hintIng.e+' '+hintIng.n+' next time — it\'s one of the ingredients needed to make '+currentExp.target.e+' '+currentExp.target.n+'!';
    }
    hintBox.style.display='';
  } else {
    hintBox.style.display='none';
  }

  const nextBtn=document.querySelector('#resultOverlay .btn-next');
  if(outOfLives){
    nextBtn.textContent='See Results →';
    nextBtn.onclick=()=>{ overlay.classList.add('hidden'); endGame(); };
  } else {
    nextBtn.textContent=correct?'Next Experiment →':'Next →';
    nextBtn.onclick=nextExperiment;
  }

  overlay.classList.remove('hidden');
}

function retryExperiment(){
  document.getElementById('resultOverlay').classList.add('hidden');
  selected=[];
  buildShelf();
  buildSlots();
  resetBeaker();
  document.getElementById('mixBtn').disabled=true;
  document.getElementById('mixBtn').classList.remove('pulse');
}

function nextExperiment(){
  document.getElementById('resultOverlay').classList.add('hidden');
  // Record result for this experiment if not already set
  if(pipResults[expIndex]===undefined){
    pipResults[expIndex]=livesAtExpStart-lives;
  }
  updatePips();
  expIndex++;
  if(expIndex>=experiments.length){endGame();}
  else{loadExperiment();}
}

// ══════════════════════════════════════════════
// END GAME
// ══════════════════════════════════════════════
function endGame(){
  gameRunning=false;
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('gameScreen').classList.add('hidden');

  const total=experiments.length;
  const pct=score/total;
  const stars=pct===1?'⭐⭐⭐':pct>=.67?'⭐⭐':pct>=.34?'⭐':'';
  document.getElementById('endTitle').textContent=pct===1?'Perfect Lab! 🎉':pct>=.5?'Great Science!':'Keep Experimenting!';
  document.getElementById('endScore').textContent=`${score} / ${total} experiments correct`;
  document.getElementById('endStars').textContent=stars;

  const ne=[];
  _incPlays('kitchenlab');
  awardKitchenLabBadges(score,total,selectedAge,ne);
  _crossCheck(ne);
  ne.forEach(id=>_toast(id));

  setTimeout(()=>renderEndBadges(ne),400);
  document.getElementById('endScreen').classList.remove('hidden');
  document.querySelector('.start-home-btn').style.display='';
}

function renderEndBadges(ne){
  const wrap=document.getElementById('endBadgesWrap');
  const row=document.getElementById('endBadgesRow');
  const neF=ne.filter(id=>id.startsWith('kl_'));
  const all=Object.keys(_lb()).filter(id=>id.startsWith('kl_'));
  if(!all.length&&!neF.length){wrap.style.display='none';return;}
  wrap.style.display='';
  const show=neF.length?neF:all;
  row.innerHTML=show.map(id=>{const b=BADGE_DEF[id];if(!b)return'';
    return`<div class="badge-coin${neF.includes(id)?' new-badge':''}" title="${b.desc}">
      <div class="badge-coin-em">${b.em}</div>
      <div class="badge-coin-name">${b.name}</div></div>`;
  }).join('');
}

function playAgain(){
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('startScreen').classList.remove('hidden');
  document.querySelector('.start-home-btn').style.display='';
  selectedAge=null;
  document.querySelectorAll('.age-btn').forEach(b=>b.classList.remove('selected'));
  document.getElementById('startExpBtn').disabled=true;
}

// ══════════════════════════════════════════════
// CONFETTI
// ══════════════════════════════════════════════
function spawnConfetti(){
  const canvas=document.getElementById('confetti-canvas');
  const ctx=canvas.getContext('2d');
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  const particles=Array.from({length:60},()=>({
    x:Math.random()*canvas.width,y:-10,
    vx:(Math.random()-0.5)*4,vy:2+Math.random()*3,
    color:['#00C9B1','#FFD93D','#FF5C5C','#A66CFF','#4ECB71'][Math.floor(Math.random()*5)],
    size:4+Math.random()*6,rot:Math.random()*360,rv:(Math.random()-0.5)*8,life:1
  }));
  let frame=0;
  function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.07;p.rot+=p.rv;p.life-=0.015;
      ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot*Math.PI/180);
      ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.color;
      ctx.fillRect(-p.size/2,-p.size/2,p.size,p.size);ctx.restore();
    });
    frame++;
    if(frame<120)requestAnimationFrame(draw);
    else ctx.clearRect(0,0,canvas.width,canvas.height);
  }
  draw();
}

// ══════════════════════════════════════════════
// BADGE SYSTEM
// ══════════════════════════════════════════════
const BADGE_KEY='crabcake_badges_v1';
const PLAYS_KEY='crabcake_plays_v1';

const BADGE_DEF={
  kl_first:     {game:'kitchenlab',em:'🧪',name:'First Experiment',desc:'Complete your first Kitchen Lab game'},
  kl_sharp:     {game:'kitchenlab',em:'⭐',name:'Sharp Scientist',desc:'Score 6+ correct in one Kitchen Lab game'},
  kl_perfect:   {game:'kitchenlab',em:'🏆',name:'Perfect Lab',desc:'Score 10/10 in Kitchen Lab'},
  kl_chem:      {game:'kitchenlab',em:'⚗️',name:'Chemist',desc:'Complete the Ages 9–10 level'},
  kl_noerror:   {game:'kitchenlab',em:'💎',name:'No Mistakes',desc:'Finish a Kitchen Lab game without losing a life'},
  kl_curious:   {game:'kitchenlab',em:'🔬',name:'Curious Mind',desc:'Play Kitchen Lab 3 times'},
  kl_juniorchef:{game:'kitchenlab',em:'🧑‍🍳',name:'Junior Chef',desc:'Play Kitchen Lab 5 times'},
  kl_kaboom:    {game:'kitchenlab',em:'💥',name:'Kaboom!',desc:'Make an experiment go wrong'},
  kl_masterchef:{game:'kitchenlab',em:'🌟',name:'Master Chef',desc:'Complete all 3 Kitchen Lab age levels'},
  cg_fan:       {game:'crabcake', em:'🦀',name:'Crabcake Fan',desc:'Play all Crabcake games at least once'},
  cg_earlybird: {game:'crabcake', em:'🌅',name:'Early Bird',desc:'Play any game before 8am'},
  cg_returning: {game:'crabcake', em:'🔁',name:'Coming Back',desc:'Play on 3 different days'},
  cg_collector: {game:'crabcake', em:'🏅',name:'Badge Collector',desc:'Earn 10 badges across all games'},
  cg_allround:  {game:'crabcake', em:'🌟',name:'All-Rounder',desc:'Earn at least one badge in every game'},
  cg_dedicated: {game:'crabcake', em:'🎮',name:'Dedicated',desc:'Play 10 games total across all games'},
  cg_bughunter: {game:'crabcake', em:'🐛',name:'Bug Hunter',desc:'Reported a bug'},
  cg_bigideas:  {game:'crabcake', em:'💡',name:'Big Ideas',desc:'Suggested a new game idea'},
};

function _lb(){try{return JSON.parse(localStorage.getItem(BADGE_KEY)||'{}')}catch{return{}}}
function _sb(d){try{localStorage.setItem(BADGE_KEY,JSON.stringify(d))}catch{}}
function _lp(){try{return JSON.parse(localStorage.getItem(PLAYS_KEY)||'{}')}catch{return{}}}
function _sp(d){try{localStorage.setItem(PLAYS_KEY,JSON.stringify(d))}catch{}}
function _award(id){const d=_lb();if(d[id])return false;d[id]=Date.now();_sb(d);return true}
function _incPlays(game){const p=_lp();p[game]=(p[game]||0)+1;_sp(p)}
function _toast(id){
  const b=BADGE_DEF[id];if(!b)return;
  const t=document.getElementById('toast');
  document.getElementById('toastEm').textContent=b.em;
  document.getElementById('toastName').textContent=b.name+' unlocked!';
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}
function _crossCheck(ne){
  const p=_lp();
  const games=['mathdive','junglewords','witchbrew','tubesort','kitchenlab'];
  if(!_lb().cg_fan&&games.every(g=>(p[g]||0)>=1)){if(_award('cg_fan'))ne.push('cg_fan');}
  const h=new Date().getHours();
  if(h<8&&!_lb().cg_earlybird){if(_award('cg_earlybird'))ne.push('cg_earlybird');}
  const totalPlays=Object.values(p).reduce((a,b)=>a+b,0);
  if(totalPlays>=10&&!_lb().cg_dedicated){if(_award('cg_dedicated'))ne.push('cg_dedicated');}
  const totalBadges=Object.keys(_lb()).length;
  if(totalBadges>=10&&!_lb().cg_collector){if(_award('cg_collector'))ne.push('cg_collector');}
}

function awardKitchenLabBadges(score,total,age,ne){
  if(_award('kl_first'))ne.push('kl_first');
  if(score===total&&_award('kl_perfect'))ne.push('kl_perfect');
  if(score>=6&&_award('kl_sharp'))ne.push('kl_sharp');
  if(age===9&&_award('kl_chem'))ne.push('kl_chem');
  // Check if all lives maintained
  const anyLivesLost=Object.values(pipResults).some(v=>v>0);
  if(!anyLivesLost&&_award('kl_noerror'))ne.push('kl_noerror');
  // Check if any wrong answer
  const anyWrong=Object.values(pipResults).some(v=>v>0);
  if(anyWrong&&_award('kl_kaboom'))ne.push('kl_kaboom');
  const p=_lp();
  if((p['kitchenlab']||0)>=3&&_award('kl_curious'))ne.push('kl_curious');
  if((p['kitchenlab']||0)>=5&&_award('kl_juniorchef'))ne.push('kl_juniorchef');
  // Check all 3 age levels
  try{
    const KEY='crabcake_kl_levels_v1';
    let lvls;try{lvls=JSON.parse(localStorage.getItem(KEY)||'[]')}catch{lvls=[];}
    if(!lvls.includes(age)){lvls.push(age);localStorage.setItem(KEY,JSON.stringify(lvls));}
    if(lvls.length>=3&&_award('kl_masterchef'))ne.push('kl_masterchef');
  }catch{}
}
