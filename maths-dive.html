<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="description" content="Dive deep and catch falling maths problems before they hit the ocean floor! Maths Dive is a free underwater maths game for kids ages 7–9 covering addition, subtraction, multiplication and division.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00C9B1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Crabcake">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <title>Maths Dive 🤿 – Free Maths Game for Kids Ages 7–9 | Crabcake Kids</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@700;800;900&display=swap" media="print" onload="this.media='all'"/>
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@700;800;900&display=swap"/></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:   #0a1628;
      --deep:   #0d2044;
      --mid:    #0e3460;
      --teal:   #00C9B1;
      --teal2:  #00a896;
      --sky:    #6ECBF5;
      --yellow: #FFD93D;
      --coral:  #FF5C5C;
      --orange: #FF9040;
      --green:  #4ECB71;
      --purple: #A66CFF;
      --white:  #ffffff;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--navy);
      font-family: 'Nunito', sans-serif;
      touch-action: none;
    }

    /* ── SCREENS ── */
    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: opacity 0.4s, transform 0.4s;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      touch-action: none;
      transform: scale(0.97);
      display: none;
    }

    /* ── OCEAN BACKGROUND ── */
    .ocean-bg {
      position: fixed;
      inset: 0;
      background: linear-gradient(180deg,
        #0a1628 0%,
        #0d2a50 30%,
        #0a3060 60%,
        #063050 100%
      );
      overflow: hidden;
      z-index: 0;
    }
    .ocean-bg::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 800px 500px at 20% 60%, rgba(0,201,177,0.08) 0%, transparent 70%),
        radial-gradient(ellipse 600px 400px at 80% 30%, rgba(110,203,245,0.06) 0%, transparent 70%);
    }

    /* Floating ambient bubbles */
    .amb-bubble {
      position: absolute;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(255,255,255,0.4), rgba(255,255,255,0.05));
      border: 1px solid rgba(255,255,255,0.2);
      animation: ambFloat linear infinite;
      pointer-events: none;
    }
    @keyframes ambFloat {
      0%   { transform: translateY(110vh) translateX(0); opacity: 0; }
      10%  { opacity: 0.6; }
      90%  { opacity: 0.4; }
      100% { transform: translateY(-20px) translateX(30px); opacity: 0; }
    }

    /* Sea floor */
    .sea-floor {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 80px;
      background: linear-gradient(180deg, transparent, rgba(0,50,80,0.8));
      z-index: 0;
      pointer-events: none;
    }
    .sea-floor::after {
      content: '🪸 🦞 🐚 🌿 🪸 🐚 🌿 🦀 🪸 🌿 🐚 🦞 🪸';
      position: absolute;
      bottom: 4px;
      left: 0; right: 0;
      text-align: center;
      font-size: 1.4rem;
      letter-spacing: 8px;
      opacity: 0.7;
    }

    /* ── START SCREEN ── */
    #startScreen {
      z-index: 10;
      gap: 0;
      padding: 2rem;
    }
    .game-title {
      font-family: 'Boogaloo', cursive;
      font-size: clamp(2.8rem, 8vw, 5rem);
      color: var(--yellow);
      text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
      text-align: center;
      line-height: 1;
      margin-bottom: 0.3rem;
      animation: titleBob 3s ease-in-out infinite;
    }
    @keyframes titleBob {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .game-subtitle {
      font-size: clamp(0.9rem, 2.5vw, 1.1rem);
      font-weight: 800;
      color: var(--teal);
      letter-spacing: 2px;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 2.5rem;
    }

    .diver-display {
      font-size: 5rem;
      margin-bottom: 1.5rem;
      animation: diverBob 2s ease-in-out infinite;
      filter: drop-shadow(0 8px 16px rgba(0,201,177,0.3));
    }
    @keyframes diverBob {
      0%,100% { transform: translateY(0) rotate(-3deg); }
      50% { transform: translateY(-12px) rotate(3deg); }
    }

    .age-select-label {
      font-size: 1rem;
      font-weight: 900;
      color: rgba(255,255,255,0.6);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 1rem;
      text-align: center;
    }

    .age-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 2rem;
    }
    .age-btn {
      padding: 0.9rem 1.6rem;
      border: 3px solid transparent;
      border-radius: 16px;
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: rgba(255,255,255,0.06);
      color: white;
      min-width: 110px;
    }
    .age-btn .age-emoji { font-size: 1.6rem; }
    .age-btn .age-label { font-size: 0.85rem; font-weight: 900; }
    .age-btn .age-topic { font-size: 0.65rem; font-weight: 700; opacity: 0.7; text-align: center; }
    .age-btn:hover { transform: translateY(-3px); background: rgba(255,255,255,0.12); }
    .age-btn.selected { border-color: var(--teal); background: rgba(0,201,177,0.15); }
    .age-btn[data-age="5"] { border-color: rgba(78,203,113,0.4); }
    .age-btn[data-age="5"].selected { border-color: var(--green); background: rgba(78,203,113,0.2); }
    .age-btn[data-age="7"] { border-color: rgba(255,217,61,0.4); }
    .age-btn[data-age="7"].selected { border-color: var(--yellow); background: rgba(255,217,61,0.15); }
    .age-btn[data-age="9"] { border-color: rgba(255,92,92,0.4); }
    .age-btn[data-age="9"].selected { border-color: var(--coral); background: rgba(255,92,92,0.15); }

    .start-btn {
      padding: 1rem 3rem;
      background: linear-gradient(135deg, var(--teal), var(--teal2));
      color: var(--navy);
      border: none;
      border-radius: 50px;
      font-family: 'Boogaloo', cursive;
      font-size: 1.8rem;
      cursor: pointer;
      box-shadow: 0 6px 0 rgba(0,0,0,0.3), 0 8px 24px rgba(0,201,177,0.3);
      transition: all 0.15s;
      opacity: 0.4;
      pointer-events: none;
    }
    .start-btn.ready {
      opacity: 1;
      pointer-events: all;
      animation: btnGlow 1.4s ease-in-out infinite;
    }
    @keyframes btnGlow {
      0%, 100% { box-shadow: 0 6px 0 rgba(0,0,0,0.3), 0 8px 24px rgba(0,201,177,0.3); transform: translateY(0); }
      50% { box-shadow: 0 6px 0 rgba(0,0,0,0.3), 0 12px 36px rgba(0,201,177,0.75), 0 0 24px rgba(0,201,177,0.5); transform: translateY(-3px); }
    }
    .start-btn.ready:hover { animation: none; transform: translateY(-4px); box-shadow: 0 10px 0 rgba(0,0,0,0.3), 0 16px 36px rgba(0,201,177,0.6); }
    .start-btn.ready:active { animation: none; transform: translateY(2px); box-shadow: 0 4px 0 rgba(0,0,0,0.3); }


    /* ── START SCREEN HOME BUTTON ── */
    .start-home-btn {
      position: fixed;
      top: 1rem;
      left: 1rem;
      z-index: 50;
    }

    /* ── HUD ── */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0.6rem 1.5rem;
      background: rgba(10,22,40,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 2px solid rgba(0,201,177,0.3);
    }
    #hud.hidden { display: none; }
    .hud-left  { display: flex; align-items: center; gap: 1rem; justify-content: flex-start; }
    .hud-center { display: flex; align-items: center; justify-content: center; }
    .hud-right { display: flex; align-items: center; gap: 0.5rem; justify-content: flex-end; }

    @media (max-width: 600px) {
      #hud {
        padding: 0.35rem 0.7rem;
        grid-template-columns: auto auto auto;
      }
      .hud-left  { gap: 0.6rem; }
      .hud-right { gap: 0.3rem; }
      .hud-label { font-size: 0.42rem; letter-spacing: 1px; }
      .hud-value { font-size: 1.2rem; }
      .hud-btn   { padding: 0.2rem 0.45rem; border-radius: 8px; }
      .hud-btn-icon  { font-size: 1rem; }
      .hud-btn-label { font-size: 0.38rem; letter-spacing: 1px; }
      #md-avatar-hud svg { width: 36px !important; height: 36px !important; }
    }

    .hud-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1px;
    }
    .hud-label {
      font-size: 0.55rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }
    .hud-value {
      font-family: 'Boogaloo', cursive;
      font-size: 1.8rem;
      color: var(--yellow);
      line-height: 1;
    }
    #timerVal { color: var(--teal); }
    #timerVal.urgent { color: var(--coral); animation: pulse 0.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }

    .hud-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: rgba(255,255,255,0.07);
      border: 2px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 0.3rem 0.7rem;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
      text-decoration: none;
    }
    .hud-btn:hover { background: rgba(255,255,255,0.14); border-color: rgba(255,255,255,0.25); transform: translateY(-2px); }
    .hud-btn:active { transform: translateY(0); }
    .hud-btn-icon { font-size: 1.2rem; line-height: 1; }
    .hud-btn-label { font-size: 0.5rem; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(255,255,255,0.45); }

    .question-bar {
      position: fixed;
      top: 70px; left: 50%; transform: translateX(-50%);
      z-index: 20;
      background: rgba(10,22,40,0.9);
      border: 2px solid rgba(0,201,177,0.4);
      border-radius: 50px;
      padding: 0.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      backdrop-filter: blur(8px);
    }
    .question-bar.hidden { display: none; }
    @keyframes qFlash {
      0%   { border-color: var(--yellow); box-shadow: 0 0 0 4px rgba(255,217,61,0.5); transform: translateX(-50%) scale(1.06); }
      60%  { border-color: var(--teal);   box-shadow: 0 0 0 2px rgba(0,201,177,0.3);  transform: translateX(-50%) scale(1.01); }
      100% { border-color: rgba(0,201,177,0.4); box-shadow: none; transform: translateX(-50%) scale(1); }
    }
    .question-bar.q-flash { animation: qFlash 0.5s ease-out forwards; }
    .question-text {
      font-family: 'Boogaloo', cursive;
      font-size: clamp(1.2rem, 4vw, 1.8rem);
      color: white;
    }
    .question-label {
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    /* ── GAME CANVAS ── */
    #gameCanvas { position: fixed; inset: 0; z-index: 5; cursor: none; pointer-events: none; }
    #gameCanvas.active { pointer-events: all; }



    /* ── FEEDBACK ANIMATIONS ── */
    .feedback-pop {
      position: fixed;
      font-family: 'Boogaloo', cursive;
      font-size: 2rem;
      font-weight: 900;
      pointer-events: none;
      z-index: 30;
      animation: feedbackAnim 0.8s ease-out forwards;
    }
    @keyframes catchPop { 0%{opacity:1;transform:scale(0.5)} 100%{opacity:0;transform:scale(2.5)} }
    @keyframes feedbackAnim {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-80px) scale(1.4); }
    }

    /* Confetti */
    .confetti-piece {
      position: fixed;
      width: 10px; height: 10px;
      border-radius: 2px;
      pointer-events: none;
      z-index: 35;
      animation: confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { opacity: 1; transform: translateY(0) rotate(0deg); }
      100% { opacity: 0; transform: translateY(200px) rotate(720deg); }
    }

    /* ── END SCREEN ── */
    #endScreen {
      z-index: 15;
      gap: 1rem;
      padding: 2rem 2rem 110px;
      overflow-y: auto;
    }
    .end-title {
      font-family: 'Boogaloo', cursive;
      font-size: clamp(2rem, 6vw, 3.5rem);
      color: var(--yellow);
      text-shadow: 3px 3px 0 rgba(0,0,0,0.3);
      text-align: center;
    }
    .end-score-box {
      background: rgba(255,255,255,0.06);
      border: 2px solid rgba(0,201,177,0.3);
      border-radius: 24px;
      padding: 1.5rem 3rem;
      text-align: center;
    }
    .end-score-label {
      font-size: 0.7rem;
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--teal);
      margin-bottom: 0.4rem;
    }
    .end-score-num {
      font-family: 'Boogaloo', cursive;
      font-size: 4rem;
      color: var(--yellow);
      line-height: 1;
      text-shadow: 3px 3px 0 rgba(0,0,0,0.2);
    }
    .end-score-sub {
      font-size: 0.85rem;
      font-weight: 700;
      color: rgba(255,255,255,0.5);
      margin-top: 0.3rem;
    }
    .end-rating {
      font-size: 3rem;
      text-align: center;
    }
    .end-message {
      font-size: 1.1rem;
      font-weight: 800;
      color: rgba(255,255,255,0.8);
      text-align: center;
      max-width: 340px;
    }
    .end-buttons {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .end-btn {
      padding: 0.8rem 2rem;
      border: none;
      border-radius: 50px;
      font-family: 'Boogaloo', cursive;
      font-size: 1.4rem;
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: 0 4px 0 rgba(0,0,0,0.3);
    }
    .end-btn:hover { transform: translateY(-2px); }
    .end-btn:active { transform: translateY(1px); box-shadow: 0 2px 0 rgba(0,0,0,0.3); }
    .btn-play-again { background: var(--teal); color: var(--navy); }
    .btn-change-age { background: rgba(255,255,255,0.1); color: white; border: 2px solid rgba(255,255,255,0.2); }
    .btn-home {
      background: rgba(255,255,255,0.1);
      color: white;
      border: 2px solid rgba(255,255,255,0.2);
      text-decoration: none;
      display: inline-flex; align-items: center;
    }

    /* ── COUNTDOWN ── */
    #countdown {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(10,22,40,0.7);
      backdrop-filter: blur(4px);
    }
    #countdown.hidden { display: none; }
    .countdown-num {
      font-family: 'Boogaloo', cursive;
      font-size: 12rem;
      color: var(--yellow);
      text-shadow: 0 0 60px rgba(255,217,61,0.5);
      animation: countPop 0.8s ease-out;
    }
    @keyframes countPop {
      0%   { transform: scale(2); opacity: 0; }
      40%  { transform: scale(0.9); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }

    /* Back button */
    .back-link {
      position: fixed;
      top: 1rem; left: 1rem;
      z-index: 50;
      color: rgba(255,255,255,0.4);
      font-size: 0.8rem;
      font-weight: 900;
      letter-spacing: 1px;
      text-decoration: none;
      text-transform: uppercase;
      transition: color 0.2s;
      display: none;
    }
    .back-link:hover { color: var(--teal); }
  /* ── BADGE SYSTEM ── */
  .badge-toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:linear-gradient(135deg,#0a1628,#1a2a4a);border:2px solid #ffd700;border-radius:20px;padding:14px 22px;display:flex;align-items:center;gap:14px;z-index:9999;box-shadow:0 8px 32px rgba(0,0,0,.5),0 0 24px rgba(255,215,0,.3);transition:transform .5s cubic-bezier(.34,1.56,.64,1),opacity .4s;opacity:0;pointer-events:none;max-width:340px;}
  .badge-toast.show{transform:translateX(-50%) translateY(0);opacity:1;}
  .badge-toast-em{font-size:2.4rem;flex-shrink:0;filter:drop-shadow(0 0 8px rgba(255,215,0,.8));animation:badgePop .6s cubic-bezier(.34,1.56,.64,1);}
  @keyframes badgePop{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0)}}
  .badge-toast-text{display:flex;flex-direction:column;gap:2px;}
  .badge-toast-label{font-size:.62rem;text-transform:uppercase;letter-spacing:2px;color:#ffd700;font-weight:bold;}
  .badge-toast-name{font-size:1.05rem;color:#fff;font-weight:bold;}
  .badge-toast-desc{font-size:.72rem;color:#80e8ff;}
  .badges-earned-row{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin:14px 0 4px;}
  .badge-coin{display:flex;flex-direction:column;align-items:center;gap:4px;position:relative;}
  .badge-coin-em{width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.8rem;border:3px solid #ffd700;background:radial-gradient(circle at 35% 30%,#fff9e6,#ffd700 60%,#b8860b);box-shadow:0 0 16px rgba(255,215,0,.5),inset 0 2px 4px rgba(255,255,255,.4);animation:coinShimmer 2s ease-in-out infinite alternate;}
  @keyframes coinShimmer{from{box-shadow:0 0 10px rgba(255,215,0,.4)}to{box-shadow:0 0 24px rgba(255,215,0,.8),0 0 40px rgba(255,215,0,.3)}}
  .badge-coin-name{font-size:.6rem;color:#ffd700;text-align:center;max-width:60px;line-height:1.2;}
  .badge-coin.new-badge .badge-coin-em::after{content:'NEW!';position:absolute;top:-6px;right:-6px;background:#ff4444;color:#fff;font-size:.45rem;font-weight:bold;padding:2px 5px;border-radius:6px;letter-spacing:.5px;}
  .badges-section-title{font-size:.75rem;text-transform:uppercase;letter-spacing:2px;color:#80e8ff;text-align:center;margin-bottom:8px;}
  .end-badges-wrap{margin:10px 0;padding:12px;background:rgba(0,201,177,.07);border:1px solid rgba(0,201,177,.2);border-radius:14px;}
  /* ── FEEDBACK STRIP ── */
  .feedback-strip{margin-top:18px;padding:12px 16px;background:rgba(0,201,177,.06);border:1px solid rgba(0,201,177,.18);border-radius:14px;text-align:center;}
  .feedback-text{font-size:.78rem;color:rgba(255,255,255,.55);margin-bottom:10px;}
  .feedback-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;}
  .feedback-btn{font-size:.7rem;padding:7px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:rgba(255,255,255,.7);text-decoration:none;transition:all .2s;white-space:nowrap;}
  .feedback-btn:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.4);color:#fff;}
  .feedback-claim{display:none;margin-top:10px;}
  .feedback-claim-btn{font-size:.72rem;padding:8px 18px;border-radius:20px;border:none;background:linear-gradient(135deg,#ffd700,#ff8800);color:#1a0a2e;font-weight:bold;cursor:pointer;transition:all .2s;animation:claimPop .4s cubic-bezier(.34,1.56,.64,1);}
  @keyframes claimPop{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
  .feedback-claim-btn:hover{transform:scale(1.06);box-shadow:0 4px 16px rgba(255,215,0,.4);}
  .feedback-claim-btn:disabled{opacity:.5;cursor:default;transform:none;background:#555;}
  </style>
</head>
<body>

  <!-- Ocean background (always visible) -->
  <div class="ocean-bg" id="oceanBg"></div>
  <div class="sea-floor"></div>
  <a href="index.html" class="back-link" id="backLink">← Back</a>

  <!-- START SCREEN -->
  <div class="screen" id="startScreen">
    <a class="hud-btn start-home-btn" href="index.html#games" title="Home">
      <span class="hud-btn-icon">🏠</span>
      <span class="hud-btn-label">Home</span>
    </a>

<script>
// ── STATE ──
let selectedAge = null;
let score = 0;
let _wrongCount = 0;
let _lastCatchTime = 0;
let streak = 0;
let _maxStreak = 0;
let timeLeft = 60;
let timerInterval = null;
let gameRunning = false;
let _countdownTick = null;
let currentAnswer = null;
let currentQuestion = '';
let fallingObjects = [];
let diver = { x: 0, y: 0, width: 60, height: 60, speed: 6, targetX: 0, targetY: 0 };
let canvas, ctx;
let animFrame;
let keys = { left: false, right: false };
let difficulty = 1;
let spawnRate = 120; // frames between spawns
let frameCount = 0;
let isMobile = false;
let timerStarted = false;

// Object types pool
const objTypes = ['bubble', 'bubble', 'bubble', 'fish', 'chest', 'jellyfish'];
const objEmojis = {
  bubble:    ['🫧', '🔵', '⚪'],
  fish:      ['🐠', '🐟', '🐡'],
  chest:     ['💰', '📦', '🎁'],
  jellyfish: ['🪼', '🫧', '🌊']
};

// ── AGE CONFIG ──
const ageConfig = {
  5: { time: 45,  speed: 0.9,  spawnRate: 100, maxObjs: 4,  label: 'Ages 5–6',  color: '#4ECB71', topic: 'Counting' },
  7: { time: 60,  speed: 1.2,  spawnRate: 80,  maxObjs: 5,  label: 'Ages 7–8',  color: '#FFD93D', topic: 'Addition & Subtraction' },
  9: { time: 75,  speed: 0.9,  spawnRate: 65,  maxObjs: 6,  label: 'Ages 9–10', color: '#FF5C5C', topic: 'Multiply & Divide' }
};

// ── HELPERS ──
function rand(min, max) { return Math.floor(Math.random() * (max - min + 1)) + min; }

// ── QUESTION GENERATORS ──
function generateQuestion() {
  let q = '', ans = 0, wrongs = [];

  if (selectedAge === 5) {
    // Counting 1–10: show a number, catch it
    ans = Math.floor(Math.random() * 10) + 1;
    q = `Find the number  ${ans}`;
    let pool = [];
    for (let i = 1; i <= 10; i++) if (i !== ans) pool.push(i);
    pool.sort(() => Math.random()-0.5);
    wrongs = pool.slice(0, 4);
  }
  else if (selectedAge === 7) {
    // Stage 1 (d=1): addition only, numbers 1–5  → answers up to 10
    // Stage 2 (d=2): addition only, numbers 1–9  → answers up to 18
    // Stage 3 (d=3): add & subtract, within 20
    // Stage 4 (d=4+): add & subtract, within 40
    const d = Math.min(difficulty, 4);
    const doSub = d >= 3 && Math.random() < 0.45;

    if (!doSub) {
      let a, b;
      if      (d === 1) { a = rand(1,5);  b = rand(1,5);  }
      else if (d === 2) { a = rand(1,9);  b = rand(1,9);  }
      else if (d === 3) { a = rand(2,12); b = rand(1,8);  }
      else              { a = rand(5,20); b = rand(1,15); }
      ans = a + b;
      q = `${a} + ${b} = ?`;
    } else {
      let a, b;
      if (d === 3) { a = rand(10,20); b = rand(1,9);  }
      else         { a = rand(15,40); b = rand(1,20); }
      ans = a - b;
      q = `${a} − ${b} = ?`;
    }
    wrongs = generateWrongs(ans, 4, 0, ans + 12);
  }
  else if (selectedAge === 9) {
    // Stage 1 (d=1): ×2, ×5, ×10 only — the 3 easiest tables
    // Stage 2 (d=2): ×2, ×3, ×4, ×5 — build up tables
    // Stage 3 (d=3): ×2–×9, introduce division by 2, 5, 10
    // Stage 4 (d=4+): all tables + full division
    const d = Math.min(difficulty, 4);
    const doDiv = d >= 3 && Math.random() < (d === 3 ? 0.3 : 0.45);

    if (!doDiv) {
      let a, b;
      if (d === 1) {
        const easy = [2, 5, 10];
        a = easy[Math.floor(Math.random() * easy.length)];
        b = rand(1, 10);
      } else if (d === 2) {
        a = rand(2, 5);
        b = rand(1, 10);
      } else if (d === 3) {
        a = rand(2, 7);
        b = rand(1, 10);
      } else {
        a = rand(2, 9);
        b = rand(2, 12);
      }
      ans = a * b;
      q = `${a} × ${b} = ?`;
    } else {
      let divisor, quotient;
      if (d === 3) {
        const easy = [2, 5, 10];
        divisor  = easy[Math.floor(Math.random() * easy.length)];
        quotient = rand(1, 10);
      } else {
        divisor  = rand(2, 9);
        quotient = rand(2, 12);
      }
      ans = quotient;
      q = `${divisor * quotient} ÷ ${divisor} = ?`;
    }
    wrongs = generateWrongs(ans, 4, 1, ans + 20);
  }

  currentAnswer = ans;
  currentQuestion = q;
  document.getElementById('questionText').textContent = q;

  // Flash the question card and play an alert chime
  const qBar = document.getElementById('questionBar');
  if (qBar) {
    qBar.classList.remove('q-flash');
    qBar.style.animationName = 'none';
    requestAnimationFrame(() => {
      qBar.style.animationName = '';
      qBar.classList.add('q-flash');
      setTimeout(() => qBar.classList.remove('q-flash'), 500);
    });
  }
  // Short alert chime — distinct from correct/wrong sounds
  try {
    const ac = getAudio();
    if (ac.state === 'suspended') ac.resume();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain); gain.connect(ac.destination);
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ac.currentTime);
    osc.frequency.setValueAtTime(660, ac.currentTime + 0.08);
    gain.gain.setValueAtTime(0.08, ac.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.2);
    osc.start(ac.currentTime);
    osc.stop(ac.currentTime + 0.2);
  } catch(e) {}

  // Mark all active objects as wrong for the new question.
  // A fresh correct object will spawn shortly via the normal spawn cycle.
  // This prevents a wrong object accidentally matching the new answer
  // and triggering an instant phantom catch on the next frame.
  fallingObjects.forEach(o => {
    if (!o.caught && !o.missed) o.isCorrect = false;
  });

  return { answer: ans, wrongs };
}

function generateWrongs(correct, count, min, max) {
  let wrongs = new Set();
  let attempts = 0;
  while (wrongs.size < count && attempts < 100) {
    let w = correct + (Math.random() < 0.5 ? 1 : -1) * (Math.floor(Math.random() * 5) + 1);
    if (w !== correct && w >= min) wrongs.add(w);
    attempts++;
  }
  return [...wrongs];
}

// ── AMBIENT BUBBLES ──
function createAmbBubbles() {
  const bg = document.getElementById('oceanBg');
  for (let i = 0; i < 12; i++) {
    const b = document.createElement('div');
    b.className = 'amb-bubble';
    const size = Math.random() * 20 + 6;
    b.style.cssText = `
      width:${size}px; height:${size}px;
      left:${Math.random()*100}%;
      animation-duration:${Math.random()*12+8}s;
      animation-delay:${Math.random()*10}s;
    `;
    bg.appendChild(b);
  }
}

// ── AGE SELECTION ──
function selectAge(age) {
  selectedAge = age;
  document.querySelectorAll('.age-btn').forEach(b => b.classList.remove('selected'));
  document.querySelector(`.age-btn[data-age="${age}"]`).classList.add('selected');
  document.getElementById('startBtn').classList.add('ready');
}

// ── COUNTDOWN ──
function startCountdown() {
  if (!selectedAge) return;
  if (gameRunning) return; // prevent re-triggering while game is active
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('backLink').style.display = 'none';

  const el = document.getElementById('countdown');
  const numEl = document.getElementById('countdownNum');
  el.classList.remove('hidden');

  let count = 3;
  numEl.textContent = count;

  _countdownTick = setInterval(() => {
    count--;
    if (count <= 0) {
      clearInterval(_countdownTick); _countdownTick = null;
      numEl.textContent = '🤿';
      setTimeout(() => {
        el.classList.add('hidden');
        startGame();
      }, 600);
    } else {
      numEl.style.animation = 'none';
      numEl.offsetHeight;
      numEl.style.animation = 'countPop 0.8s ease-out';
      numEl.textContent = count;
    }
  }, 900);
}

// ── GAME START ──
function startGame() {
  if (gameRunning) return; // safety guard
  // Eagerly create + resume AudioContext inside the user gesture (age btn click)
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  } catch(e) {}
  canvas = document.getElementById('gameCanvas');
  ctx = canvas.getContext('2d');
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const cfg = ageConfig[selectedAge];
  timeLeft = cfg.time;
  score = 0;
  _wrongCount = 0;
  streak = 0;
  _maxStreak = 0;
  difficulty = 1;
  frameCount = 0;
  spawnRate = cfg.spawnRate;
  fallingObjects = [];
  gameRunning = true;
  timerStarted = false;

  diver.x = canvas.width / 2;
  diver.y = canvas.height - 180;
  diver.targetX = diver.x;
  diver.targetY = diver.y;

  // Detect mobile
  isMobile = ('ontouchstart' in window) || window.innerWidth < 768;

  updateHUD();
  generateQuestion();

  document.getElementById('hud').classList.remove('hidden');
  document.getElementById('questionBar').classList.remove('hidden');
  document.getElementById('gameCanvas').classList.remove('hidden');
  document.getElementById('gameCanvas').classList.add('active');

  // Mouse/tap movement
  canvas.addEventListener('mousemove', onMouseMove);
  canvas.addEventListener('touchmove', onTouchMove, { passive: false });
  canvas.addEventListener('click', onCanvasClick);

  // Keyboard
  window.addEventListener('keydown', onKeyDown);
  window.addEventListener('keyup', onKeyUp);

  gameLoop();
}

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  if (diver) {
    diver.y = canvas.height - 180;
    diver.targetY = diver.y;
  }
}

// ── INPUT ──
function onMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  diver.targetX = e.clientX - rect.left;
  diver.targetY = e.clientY - rect.top;
}
function onTouchMove(e) {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  diver.targetX = e.touches[0].clientX - rect.left;
  diver.targetY = e.touches[0].clientY - rect.top;
}
function onCanvasClick(e) {
  const rect = canvas.getBoundingClientRect();
  diver.targetX = e.clientX - rect.left;
  diver.targetY = e.clientY - rect.top;
}
function onKeyDown(e) {
  if (e.key === 'ArrowLeft')  keys.left  = true;
  if (e.key === 'ArrowRight') keys.right = true;
}
function onKeyUp(e) {
  if (e.key === 'ArrowLeft')  keys.left  = false;
  if (e.key === 'ArrowRight') keys.right = false;
}


// ── SPAWNING ──
function spawnObject() {
  const cfg = ageConfig[selectedAge];
  if (fallingObjects.length >= cfg.maxObjs + difficulty) return;

  const { answer, wrongs } = generateQuestionValues();
  // Decide if this object carries correct or wrong answer
  const isCorrect = fallingObjects.filter(o => o.isCorrect).length === 0 && Math.random() < 0.6;
  const value = isCorrect ? answer : wrongs[Math.floor(Math.random() * wrongs.length)];
  const type = objTypes[Math.floor(Math.random() * objTypes.length)];
  const emojis = objEmojis[type];
  const emoji = emojis[Math.floor(Math.random() * emojis.length)];

  fallingObjects.push({
    x: Math.random() * (canvas.width - 80) + 40,
    y: -60,
    value,
    isCorrect,
    type,
    emoji,
    speed: cfg.speed + Math.random() * 0.4 + (difficulty * 0.08),
    size: selectedAge === 5 ? 64 : 54,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: (Math.random() - 0.5) * 0.04,
    opacity: 1,
    caught: false,
    missed: false
  });
}

function generateQuestionValues() {
  // Return current answer and generate fresh wrongs
  const wrongs = generateWrongs(currentAnswer, 5, 1, currentAnswer + 15);
  return { answer: currentAnswer, wrongs };
}

// ── GAME LOOP ──
function gameLoop() {
  if (!gameRunning) return;
  frameCount++;

  const now = Date.now();
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // ── PHASE 1: Move objects, detect events — NO side effects ──
  // Record catch/miss as plain flags; never call generateQuestion/spawnX here
  let catchIsCorrect = null; // null=no catch, true=correct, false=wrong
  let catchX = 0, catchY = 0;
  let missedCorrect = false;
  const nextObjects = [];

  for (let i = 0; i < fallingObjects.length; i++) {
    const o = fallingObjects[i];

    o.y += o.speed;
    o.wobble += o.wobbleSpeed;
    const wx = o.x + Math.sin(o.wobble) * 12;

    // Off screen — note but DO NOT call generateQuestion here
    if (o.y > canvas.height + 60) {
      if (o.isCorrect) missedCorrect = true;
      continue;
    }

    // Collision — record ONCE per frame, after cooldown
    if (catchIsCorrect === null && now - _lastCatchTime > 200) {
      const dx = Math.abs(wx - diver.x);
      const dy = Math.abs(o.y - diver.y);
      if (dx < 50 && dy < 50) {
        _lastCatchTime = now;
        catchIsCorrect = o.isCorrect; // snapshot before ANY mutation
        catchX = wx;
        catchY = o.y;
        showCatchFlash(wx, o.y, o.isCorrect);
        continue; // remove from game
      }
    }

    drawObject(o, wx);
    nextObjects.push(o);
  }

  // Replace fallingObjects BEFORE any state mutation
  fallingObjects = nextObjects;

  // ── PHASE 2: Apply catch/miss results — safe to mutate now ──
  if (catchIsCorrect === true) {
    startTimer();
    score++;
    streak++;
    if (streak > _maxStreak) _maxStreak = streak;
    if (streak >= 5 && _award('md_fire')) _toast('md_fire');
    updateHUD();

    if (streak % 5 === 0) {
      timeLeft += 10;
      document.getElementById('timerVal').textContent = timeLeft;
      showFeedback(catchX, catchY - 40, '🔥 +10s bonus!', '#FFD93D');
      spawnConfetti(catchX, catchY);
      flashScreen('#FFD93D');
      fallingObjects = []; // clear field on milestone
    } else if (streak % 3 === 0) {
      timeLeft += 5;
      document.getElementById('timerVal').textContent = timeLeft;
      showFeedback(catchX, catchY - 40, '⭐ +5s bonus!', '#4ECB71');
      spawnConfetti(catchX, catchY);
      flashScreen('#4ECB71');
    } else {
      showFeedback(catchX, catchY, '✓ +1', '#4ECB71');
      flashScreen('#4ECB71');
    }
    playSound('correct');
    generateQuestion(); // safe: fallingObjects = nextObjects, caught obj not in it
    fallingObjects.forEach(o => { o.isCorrect = (o.value === currentAnswer); });
    spawnCorrectObject(); // immediately give player a fresh correct object

  } else if (catchIsCorrect === false) {
    startTimer();
    streak = 0;
    timeLeft = Math.max(0, timeLeft - 2);
    updateHUD();
    showFeedback(catchX, catchY, '✗ -2s', '#FF5C5C');
    _wrongCount++;
    playSound('wrong');
    flashScreen('#FF5C5C');
    if (timeLeft <= 0) { endGame(); return; }
  }

  if (missedCorrect) {
    generateQuestion();
    fallingObjects.forEach(o => { o.isCorrect = (o.value === currentAnswer); });
    spawnCorrectObject();
  }

  // ── PHASE 3: Spawn new objects ──
  if (frameCount % Math.floor(spawnRate) === 0) {
    spawnObject();
    const hasCorrect = fallingObjects.some(o => o.isCorrect);
    if (!hasCorrect && fallingObjects.length < ageConfig[selectedAge].maxObjs + difficulty) {
      spawnCorrectObject();
    }
  }

  // ── PHASE 4: Move diver ──
  if (keys.left)  diver.targetX -= 8;
  if (keys.right) diver.targetX += 8;
  const HUD_H = 70;
  const FLOOR = 70;
  diver.targetX = Math.max(40, Math.min(canvas.width - 40, diver.targetX));
  diver.targetY = Math.max(HUD_H + 40, Math.min(canvas.height - FLOOR - 20, diver.targetY));
  diver.x += (diver.targetX - diver.x) * 0.15;
  diver.y += (diver.targetY - diver.y) * 0.15;
  drawDiver();

  animFrame = requestAnimationFrame(gameLoop);
}
function showCatchFlash(x, y, isCorrect) {
  const el = document.createElement('div');
  el.style.cssText = [
    `position:fixed`,
    `left:${x}px`,
    `top:${y}px`,
    `width:60px`,
    `height:60px`,
    `margin:-30px 0 0 -30px`,
    `border-radius:50%`,
    `background:${isCorrect ? 'rgba(78,203,113,0.5)' : 'rgba(255,92,92,0.4)'}`,
    `pointer-events:none`,
    `z-index:200`,
    `animation:catchPop 0.35s ease-out forwards`,
  ].join(';');
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 400);
}

function spawnCorrectObject() {
  const cfg = ageConfig[selectedAge];
  const type = objTypes[Math.floor(Math.random() * objTypes.length)];
  const emojis = objEmojis[type];
  const emoji = emojis[Math.floor(Math.random() * emojis.length)];
  fallingObjects.push({
    x: Math.random() * (canvas.width - 80) + 40,
    y: -60,
    value: currentAnswer,
    isCorrect: true,
    type, emoji,
    speed: cfg.speed + (difficulty * 0.1),
    size: selectedAge === 5 ? 64 : 54,
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: (Math.random() - 0.5) * 0.04,
    opacity: 1,
    caught: false,
    missed: false
  });
}

function drawObject(obj, wx) {
  ctx.save();
  ctx.globalAlpha = obj.opacity;

  // Flash green briefly when correctly caught
  const isFlashing = obj.flashGreen && (Date.now() - obj.flashGreen < 200);

  // Circle background — identical for all items unless flashing green
  const gradient = ctx.createRadialGradient(wx, obj.y, 0, wx, obj.y, obj.size / 2);
  if (isFlashing) {
    gradient.addColorStop(0, 'rgba(78,203,113,0.5)');
    gradient.addColorStop(1, 'rgba(78,203,113,0.15)');
    ctx.shadowColor = '#4ECB71';
    ctx.shadowBlur = 24;
  } else {
    gradient.addColorStop(0, 'rgba(255,255,255,0.12)');
    gradient.addColorStop(1, 'rgba(255,255,255,0.02)');
  }
  ctx.beginPath();
  ctx.arc(wx, obj.y, obj.size / 2, 0, Math.PI * 2);
  ctx.fillStyle = gradient;
  ctx.fill();
  ctx.strokeStyle = isFlashing ? 'rgba(78,203,113,0.8)' : 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.shadowBlur = 0;

  // Emoji
  ctx.font = `${obj.size * 0.5}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(obj.emoji, wx, obj.y - obj.size * 0.12);

  // Value — same colour for all
  ctx.font = `900 ${obj.size * 0.32}px 'Boogaloo', cursive`;
  ctx.fillStyle = isFlashing ? '#4ECB71' : 'rgba(255,255,255,0.85)';
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur = 4;
  ctx.fillText(obj.value, wx, obj.y + obj.size * 0.22);

  ctx.restore();
}

function drawDiver() {
  ctx.save();
  ctx.font = '52px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';

  // Bubble trail
  ctx.globalAlpha = 0.4;
  ctx.font = '16px serif';
  ctx.fillText('🫧', diver.x + Math.sin(frameCount * 0.1) * 8, diver.y - 40);
  ctx.globalAlpha = 0.2;
  ctx.fillText('🫧', diver.x + Math.sin(frameCount * 0.07) * 12 - 10, diver.y - 60);

  ctx.globalAlpha = 1;
  ctx.font = '52px serif';
  // Slight swim animation
  const swimBob = Math.sin(frameCount * 0.08) * 3;
  ctx.translate(diver.x, diver.y + swimBob);

  // Glow
  ctx.shadowColor = 'rgba(0,201,177,0.6)';
  ctx.shadowBlur = 20;
  ctx.fillText('🤿', 0, 0);

  ctx.restore();
}

// ── TIMER ──
function startTimer() {
  if (timerStarted) return;
  timerStarted = true;
  const cfg = ageConfig[selectedAge];
  timerInterval = setInterval(() => {
    timeLeft--;
    document.getElementById('timerVal').textContent = timeLeft;
    if (timeLeft <= 10) document.getElementById('timerVal').classList.add('urgent');
    if (timeLeft <= 0) endGame();
    // Increase difficulty every 15 seconds
    const elapsed = cfg.time - timeLeft;
    difficulty = 1 + Math.floor(elapsed / 15);
    spawnRate = Math.max(cfg.spawnRate - difficulty * 8, 30);
  }, 1000);
}

// ── CATCH HANDLING ──
function onCatch(obj, x, y) {
  startTimer();
  if (obj.isCorrect) {
    score++;
    streak++;
    if (streak > _maxStreak) { _maxStreak = streak; }
    if (streak >= 5 && _award('md_fire')) { _toast('md_fire'); }
    updateHUD();
    const clearField = (streak % 5 === 0);
    if (clearField) {
      timeLeft += 10;
      document.getElementById('timerVal').textContent = timeLeft;
      showFeedback(x, y - 40, '🔥 +10s bonus!', '#FFD93D');
      spawnConfetti(x, y);
      flashScreen('#FFD93D');
    } else if (streak % 3 === 0) {
      timeLeft += 5;
      document.getElementById('timerVal').textContent = timeLeft;
      showFeedback(x, y - 40, '⭐ +5s bonus!', '#4ECB71');
      spawnConfetti(x, y);
      flashScreen('#4ECB71');
    } else {
      showFeedback(x, y, '✓ +1', '#4ECB71');
      flashScreen('#4ECB71');
    }
    playSound('correct');
    generateQuestion();
    return clearField; // caller clears field safely after filter
  } else {
    streak = 0;
    timeLeft = Math.max(0, timeLeft - 2);
    updateHUD();
    showFeedback(x, y, '✗ -2s', '#FF5C5C');
    _wrongCount++;
    playSound('wrong');
    flashScreen('#FF5C5C');
    if (timeLeft <= 0) endGame();
    return false;
  }
}

function updateHUD() {
  document.getElementById('scoreVal').textContent = score;
  document.getElementById('timerVal').textContent = timerStarted ? timeLeft : '▶';
}

function showFeedback(x, y, text, color) {
  const el = document.createElement('div');
  el.className = 'feedback-pop';
  el.textContent = text;
  el.style.cssText = `left:${x}px; top:${y}px; color:${color}; transform:translateX(-50%);`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 800);
}

function spawnConfetti(x, y) {
  const colors = ['#FFD93D','#00C9B1','#FF5C5C','#A66CFF','#4ECB71','#6ECBF5'];
  for (let i = 0; i < 20; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    const angle = (Math.random() * Math.PI * 2);
    const dist = Math.random() * 80 + 20;
    el.style.cssText = `
      left:${x + Math.cos(angle)*dist}px;
      top:${y + Math.sin(angle)*dist - 60}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      width:${Math.random()*10+5}px;
      height:${Math.random()*10+5}px;
      border-radius:${Math.random() < 0.5 ? '50%' : '2px'};
      animation-duration:${Math.random()*0.6+0.5}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1100);
  }
}

function flashScreen(color) {
  const flash = document.createElement('div');
  flash.style.cssText = `
    position:fixed;inset:0;z-index:100;
    background:${color};opacity:0.15;
    pointer-events:none;
    animation:flashAnim 0.3s ease-out forwards;
  `;
  const style = document.createElement('style');
  style.textContent = '@keyframes flashAnim{0%{opacity:0.2}100%{opacity:0}}';
  document.head.appendChild(style);
  document.body.appendChild(flash);
  setTimeout(() => { flash.remove(); style.remove(); }, 300);
}

// ── SOUNDS (Web Audio API) ──
let audioCtx = null;
function getAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
let _soundOn = true;

function toggleSound() {
  _soundOn = !_soundOn;
  const btn = document.getElementById('soundToggleBtn');
  if (btn) {
    btn.querySelector('.hud-btn-icon').textContent = _soundOn ? '🔊' : '🔇';
    btn.querySelector('.hud-btn-label').textContent = _soundOn ? 'Sound' : 'Muted';
  }
}

function playSound(type) {
  if (!_soundOn) return;
  try {
    const ac = getAudio();
    if (ac.state === 'suspended') ac.resume();
    const osc = ac.createOscillator();
    const gain = ac.createGain();
    osc.connect(gain);
    gain.connect(ac.destination);
    if (type === 'correct') {
      osc.frequency.setValueAtTime(523, ac.currentTime);
      osc.frequency.setValueAtTime(659, ac.currentTime + 0.1);
      osc.frequency.setValueAtTime(784, ac.currentTime + 0.2);
      gain.gain.setValueAtTime(0.15, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.4);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.4);
    } else {
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(200, ac.currentTime);
      osc.frequency.setValueAtTime(150, ac.currentTime + 0.1);
      gain.gain.setValueAtTime(0.1, ac.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.25);
      osc.start(ac.currentTime);
      osc.stop(ac.currentTime + 0.25);
    }
  } catch(e) {}
}

// ── END GAME ──
function endGame() {
  gameRunning = false;
  clearInterval(timerInterval);
  cancelAnimationFrame(animFrame);
  timeLeft = 0;

  // Clean up
  canvas.removeEventListener('mousemove', onMouseMove);
  canvas.removeEventListener('touchmove', onTouchMove);
  canvas.removeEventListener('click', onCanvasClick);
  window.removeEventListener('keydown', onKeyDown);
  window.removeEventListener('keyup', onKeyUp);

  // Clear all game objects and canvas
  fallingObjects = [];
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // Hide game elements
  document.getElementById('hud').classList.add('hidden');
  document.getElementById('questionBar').classList.add('hidden');
  document.getElementById('gameCanvas').classList.add('hidden');
  document.getElementById('gameCanvas').classList.remove('active');

  // Score evaluation
  let rating, title, message;
  const cfg = ageConfig[selectedAge];
  const pct = score / (cfg.time / 5); // rough max

  if (score === 0) {
    rating = '🌊'; title = 'Keep Diving!';
    message = "Don't give up — every diver starts somewhere! Try again!";
  } else if (score < 5) {
    rating = '⭐'; title = 'Nice Try!';
    message = 'Good effort! Keep practising and you\'ll catch more next time!';
  } else if (score < 10) {
    rating = '⭐⭐'; title = 'Great Dive!';
    message = 'You\'re getting better! Can you beat your score next time?';
  } else if (score < 15) {
    rating = '⭐⭐⭐'; title = 'Amazing Diver!';
    message = 'Wow, you\'re a maths superstar! The ocean is yours! 🌊';
  } else {
    rating = '🏆✨'; title = 'LEGENDARY!';
    message = 'Unbelievable score! You\'re the greatest math diver ever! 🤿🦀';
    spawnConfetti(window.innerWidth/2, window.innerHeight/2);
    setTimeout(() => spawnConfetti(window.innerWidth/3, window.innerHeight/3), 300);
    setTimeout(() => spawnConfetti(window.innerWidth*0.7, window.innerHeight*0.4), 600);
  }

  document.getElementById('endRating').textContent = rating;
  document.getElementById('endTitle').textContent = title;
  document.getElementById('endScoreNum').textContent = score;
  document.getElementById('endScoreSub').textContent = `correct ${cfg.label} answers`;
  document.getElementById('endMessage').textContent = message;

  document.getElementById('endScreen').classList.remove('hidden');
  document.getElementById('backLink').style.display = 'block';

  // Award badges
  awardMathDiveBadges(score, _maxStreak, selectedAge);
  _maxStreak = 0;
}

function playAgain() {
  document.getElementById('endScreen').classList.add('hidden');
  document.getElementById('backLink').style.display = 'none';

const BADGE_KEY='crabcake_badges_v1';

function _sb(d){try{localStorage.setItem(BADGE_KEY,JSON.stringify(d));}catch{}}
function _lp(){try{return JSON.parse(localStorage.getItem(PLAYS_KEY)||'{}');}catch{return{};}}
function _sp(d){try{localStorage.setItem(PLAYS_KEY,JSON.stringify(d));}catch{}}
function _award(id){const d=_lb();if(d[id])return false;d[id]={earned:true,date:new Date().toLocaleDateString()};_sb(d);return true;}
function _incPlays(game){const p=_lp();p[game]=(p[game]||0)+1;p._total=(p._total||0)+1;_sp(p);return p;}
let _tq=[],_tb=false;
function _toast(id){_tq.push(id);if(!_tb)_nxt();}
function _nxt(){
  if(!_tq.length){_tb=false;return;}_tb=true;
  const id=_tq.shift();const b=BADGE_DEF[id];if(!b){_nxt();return;}
  let t=document.getElementById('_bgt');
  if(!t){t=document.createElement('div');t.id='_bgt';t.className='badge-toast';

  document.getElementById('_bgn').textContent=b.name;
  document.getElementById('_bgd').textContent=b.desc;
  t.classList.add('show');

  if(!_lb().cg_fan&&games.every(g=>(p[g]||0)>=1)){if(_award('cg_fan'))ne.push('cg_fan');}
  const d=_lb();
  const gm={mathdive:false,junglewords:false,witchbrew:false,tubesort:false};
  Object.keys(BADGE_DEF).forEach(id=>{const b=BADGE_DEF[id];if(b.game!=='crabcake'&&d[id])gm[b.game]=true;});
